# ──────────────────────────────────────────────────────────────
# daily-sync.yml — Daglig synkronisering af salgsdata til Supabase
#
# Kører kl. 04:00 og 06:00 dansk tid (UTC+2 om sommeren = 02:00 og 04:00 UTC)
# Kalder /api/sync-supabase som henter data fra OnlinePOS og gemmer i Supabase.
# Catch-up mekanisme i API'en sørger for at fylde eventuelle huller (op til 5 dage).
# ──────────────────────────────────────────────────────────────

name: Daglig salgsdata-sync

on:
  schedule:
    # Kl. 04:00 dansk sommertid (02:00 UTC) — tidligst mulige sync
    - cron: '0 2 * * *'
    # Kl. 06:00 dansk sommertid (04:00 UTC) — backup-kørsel
    - cron: '0 4 * * *'
  # Tillad manuel kørsel fra GitHub Actions-fanen
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Synk salgsdata (OnlinePOS)
        run: |
          echo "Synker salgsdata..."
          curl -s "https://omar-dashboard-seven.vercel.app/api/sync-supabase?run=now"
          echo "Salgsdata synced"

      - name: Synk budget og løn (SameSystem)
        run: |
          echo "Synker SameSystem..."
          curl -s "https://omar-dashboard-seven.vercel.app/api/sync-samesystem?run=now"
          echo "SameSystem synced"
